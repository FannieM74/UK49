services:
  - type: web
    name: uk49-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: DATA_DIR
        value: /var/lib/uk49
    disk:
      name: uk49-data
      mountPath: /var/lib/uk49
      sizeGB: 1

  - type: web
    name: uk49-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: uk49-backend
          type: web
          property: host
      - key: NODE_VERSION
        value: 22
