services:
  - type: web
    name: uk49-backend
    env: docker
    region: oregon
    plan: free
    rootDir: backend
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: groq/llama-3.3-70b-versatile
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: DATA_DIR
        value: /var/lib/uk49

  - type: web
    name: uk49-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://uk49-backend.onrender.com
      - key: NODE_VERSION
        value: "22"
